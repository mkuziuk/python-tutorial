name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  notebook-compat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12 for Colab compatibility
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Check generated learner notebooks
        run: python tools/build_part2_notebooks.py --check

      - name: Execute Part II solution notebooks
        run: python tools/run_part2_notebooks.py

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install --global pnpm@9.15.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify lessons, archives, build, and links
        run: pnpm verify

  build:
    needs: [quality, notebook-compat]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages URLs
        run: |
          echo "SITE_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io" >> "$GITHUB_ENV"
          repo="${GITHUB_REPOSITORY#*/}"
          if [ "$repo" != "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            echo "BASE_PATH=/$repo" >> "$GITHUB_ENV"
          fi

      - name: Install, build, and upload site
        uses: withastro/action@v6
        with:
          node-version: 24
          package-manager: pnpm@9.15.4

      - name: Verify generated Pages links
        run: node tools/check_internal_links.mjs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
